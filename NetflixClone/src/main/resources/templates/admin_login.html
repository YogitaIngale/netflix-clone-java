<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body { margin:0; font-family: Arial; background:#111; display:flex; justify-content:center; align-items:center; height:100vh; color:white;}
.form-container { background: rgba(0,0,0,0.8); padding: 40px; border-radius: 8px; width: 300px;}
form input, form button { width:100%; padding: 12px; margin-bottom: 15px; border:none; border-radius:4px;}
form input { background:#333; color:white;}
form button { background:red; color:white; cursor:pointer;}
form button:hover { background:#e50914;}
</style>
</head>
<body>

<div class="form-container">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <p><a href="/login">Back to User Login</a></p>
</div>

<script src="/js/admin_login.js"></script>
</body>
</html>
